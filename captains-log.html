<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USS TJR - Captain's Log</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="header">
        <h1>Captain's Log</h1>
        <p class="subtitle">Daily Mission Record</p>
    </header>

    <main class="container">

        <section class="card">
            <h2>Log Details</h2>

            <label>Stardate</label>
            <input type="text" id="stardateInput" value="260604.01">

            <label>Date</label>
            <input type="date" id="dateInput">
        </section>

        <section class="dashboard-grid">
            <div class="metric-card">
                <h3>Mood</h3>
                <input type="number" id="mood" min="0" max="10">
            </div>

            <div class="metric-card">
                <h3>Energy</h3>
                <input type="number" id="energy" min="0" max="10">
            </div>

            <div class="metric-card">
                <h3>Pain</h3>
                <input type="number" id="pain" min="0" max="10">
            </div>

            <div class="metric-card">
                <h3>Stress</h3>
                <input type="number" id="stress" min="0" max="10">
            </div>
        </section>

        <section class="card">
            <h2>Today's Wins</h2>
            <textarea id="wins" rows="4"></textarea>
        </section>

        <section class="card">
            <h2>Challenges</h2>
            <textarea id="challenges" rows="4"></textarea>
        </section>

        <section class="card">
            <h2>Lessons Learned</h2>
            <textarea id="lessons" rows="4"></textarea>
        </section>

        <section class="card">
            <h2>Gratitude</h2>
            <textarea id="gratitude" rows="4"></textarea>
        </section>

        <section class="two-column-grid">
            <div class="card">
                <h2>Health</h2>
                <textarea id="health" rows="4"></textarea>
            </div>

            <div class="card">
                <h2>Career</h2>
                <textarea id="career" rows="4"></textarea>
            </div>
        </section>

        <section class="card">
            <h2>TJR Mind Body</h2>
            <textarea id="mindbody" rows="4"></textarea>
        </section>

        <section class="card">
            <h2>Tomorrow's Priorities</h2>

            <input type="text" id="priority1" placeholder="Priority 1">
            <input type="text" id="priority2" placeholder="Priority 2">
            <input type="text" id="priority3" placeholder="Priority 3">
        </section>

        <section class="card captain-log-panel">
            <h2>Generate Log</h2>

            <button class="button" onclick="generateLog()">Generate Markdown</button>
            <button class="button secondary-button" onclick="copyLog()">Copy Markdown</button>

            <textarea id="markdownOutput" rows="20" readonly></textarea>
        </section>

        <section class="card">
            <a href="index.html" class="button">Return to Command Deck</a>
        </section>

    </main>

    <footer class="footer">
        <p>USS TJR v1.0 · Captain's Log Online</p>
    </footer>

    <script src="js/app.js"></script>

</body>
</html>
